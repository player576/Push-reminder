<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напоминалка</title>
    
    <!-- Подключаем официальный скрипт OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                // ВСТАВЬ СЮДА СВОЙ APP ID ИЗ НАСТРОЕК ONESIGNAL (строка из Keys & IDs)
                appId: "44510239-9e9e-48bb-bf6e-6d7593cc310b",
                allowLocalhostAsSecureOrigin: true,
                notifyButton: {
                    enable: true, /* Показывает колокольчик для подписки на экран */
                    position: 'bottom-right',
                    size: 'medium',
                    theme: 'default'
                },
            });
        });
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-serif: center;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Создать напоминание</h2>
    <p>Что нужно сделать/принять:</p>
    <input type="text" id="reminderText" placeholder="Например: Выпить таблетку" value="Проба">
    <button onclick="sendReminder()">Отправить напоминание</button>
</div>

<script>
    async function sendReminder() {
        const text = document.getElementById('reminderText').value;
        if (!text) {
            alert('Введите текст напоминания!');
            return;
        }

        try {
            // URL твоего сервера на Render (укажи свой актуальный адрес push-reminder2)
            const response = await fetch("https://push-reminder2.onrender.com/send-reminder", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text })
            });

            const result = await response.json();
            
            if (response.ok) {
                alert('Успешно отправлено!');
            } else {
                alert('Сервер Render вернул ошибку: ' + JSON.stringify(result.error || result));
            }
        } catch (error) {
            alert('Ошибка сети: ' + error.message);
        }
    }
</script>

</body>
</html>
