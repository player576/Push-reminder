<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "22f04b3f-265d-466e-adf3-293ffbfc96c",
      safari_web_id: "web.onesignal.auto.11a76d30-e2a9-4f46-9be9-382fbd4a01f1",
      notifyButton: {
        enable: true,
      },
    });
    // Сразу вешаем тег "Danil" при инициализации на Вебе
    await OneSignal.User.addTag("username", "Danil");
  });
</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напоминалка</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f4f4f9; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            max-width: 400px;
            margin: 20px auto;
        }
        h2 { 
            color: #333; 
            margin-top: 0;
            text-align: center;
        }
        label {
            font-size: 14px;
            color: #666;
            display: block;
            margin-top: 10px;
        }
        input, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0 15px 0; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            margin-bottom: 0;
        }
        button:hover { 
            background: #0056b3; 
        }
    </style>

    <!-- Подключаем OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignal = window.OneSignal || [];
        OneSignal.push(function() {
            OneSignal.init({
                appId: "22f04b3f-265d-466e-adf3-293ffbbfc96c", // Замени на свой App ID из панели OneSignal
                safari_web_id: "ЕСЛИ_ЕСТЬ_ДЛЯ_SAFARI", // Можно оставить пустым, если только для Android
                notifyButton: {
                    enable: false, // Отключаем стандартную кнопку-колокольчик OneSignal
                },
            });
        });
    </script>
</head>
<body>

<div class="card">
    <h2>Создать напоминание</h2>
    
    <label for="remindText">Что нужно сделать/принять:</label>
    <input type="text" id="remindText" placeholder="Например: Пора принять лекарства">
    
    <label for="remindTime">Когда напомнить:</label>
    <input type="datetime-local" id="remindTime">
    
    <button onclick="scheduleReminder()">Установить напоминание</button>
</div>

<script src="app.js"></script>
</body>
</html>
